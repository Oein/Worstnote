# Local-only dev stack: Postgres + MinIO. Bring up with:
#   docker compose -f server/deploy/docker-compose.dev.yml up -d
#
# After Postgres is healthy, run migrations:
#   goose -dir server/migrations postgres \
#     "postgres://notee:notee@localhost:5432/notee?sslmode=disable" up
#
# MinIO console (create the bucket "notee-assets" once):
#   http://localhost:9001  (user: minioadmin / pass: minioadmin)

services:
  postgres:
    image: postgres:16-alpine
    container_name: notee-postgres
    environment:
      POSTGRES_USER: notee
      POSTGRES_PASSWORD: notee
      POSTGRES_DB: notee
    ports:
      - "5432:5432"
    volumes:
      - notee-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notee -d notee"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: notee-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - notee-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: ensure the bucket exists. Re-running is idempotent.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/notee-assets &&
        mc anonymous set none local/notee-assets
      "

volumes:
  notee-pg-data:
  notee-minio-data:
